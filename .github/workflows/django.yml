name: Django CI

permissions:
  contents: read

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.14]
        
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: WORKDB
          POSTGRES_USER: ROOT
          POSTGRES_PASSWORD: 2010665KE
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        cd server/
        pip install -r requirements.txt
    - name: Run Tests
      env:
        SECRET_KEY: g^iuexa=!fva713-*(sk6^x&hi@d=lb!uiu*zc5xt!e#t_&qvo
        PROD: "True"
        ALLOWED_HOSTS: localhost
        CORS_ALLOWED_ORIGINS: http://localhost:5173
        DB_NAME: WORKDB
        DB_USER: ROOT
        DB_PASSWORD: 2010665KE
        DB_HOST: localhost
      run: |
        cd server/
        python manage.py migrate
        python manage.py test
